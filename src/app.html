<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/logomark-parsnip.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      (function () {
        const t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <meta name="google-site-verification" content="IoZfcx4l5ZLI16iWGj2JNUMbNzx-1kzYMYfIXwE2t8Q" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-base-100 font-body text-base-content">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
